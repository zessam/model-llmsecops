# garak safety probes via NeMo Evaluator. Only the probe config lives here;
# the target endpoint is passed by the workflow as CLI flags. See README.md.

config:
  type: garak
  params:
    parallelism: 8
    max_new_tokens: 128
    # Prompts-per-probe cap lives in garak.site.yaml (soft_probe_prompt_cap);
    # NeMo's limit_samples is ignored by garak.
    temperature: 0.1
    top_p: 0.7
    extra:
      # Minimal smoke test: one auto-scaling probe → 5 requests total (with
      # generations=1 + soft_probe_prompt_cap=5). Just to confirm the run works.
      # To widen later, append any of these:
      #   encoding.InjectBase64, promptinject.HijackHateHumans, malwaregen.Payload,
      #   packagehallucination.Python, lmrc.SlurUsage, misleading.FalseAssertion
      #   (note: fixed-prompt probes like misleading.FalseAssertion ignore the cap
      #    and run 100+ prompts — add those last).
      probes: dan.DanInTheWild
