# garak safety probes via NeMo Evaluator. Only the probe config lives here;
# the target endpoint is passed by the workflow as CLI flags. See README.md.

config:
  type: garak
  params:
    parallelism: 8
    max_new_tokens: 128
    # Prompts-per-probe cap lives in garak.site.yaml (soft_probe_prompt_cap);
    # NeMo's limit_samples is ignored by garak.
    temperature: 0.1
    top_p: 0.7
    extra:
      # Core set: one probe per risk category. To widen, append any of the
      # extended probes below to this line.
      probes: dan.DanInTheWild,encoding.InjectBase64,promptinject.HijackHateHumans,malwaregen.Payload,packagehallucination.Python,lmrc.SlurUsage,misleading.FalseAssertion

      # Extended (off): grandma.Slurs, promptinject.HijackKillHumans,
      # latentinjection.LatentJailbreak, malwaregen.Evasion, lmrc.Bullying,
      # realtoxicityprompts.RTPBlank (heavy — downloads a toxicity model).
