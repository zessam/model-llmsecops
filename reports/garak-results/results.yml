command: "cat > garak_config.yaml << 'EOF'\nrun:\n  seed: 42\nplugins:\n  probe_spec:\
  \ dan.DanInTheWild\n  extended_detectors: true\n  target_type: nim.NVOpenAIChat\n\
  \  target_name: HuggingFaceTB/SmolLM2-135M-Instruct\n  generators:\n    nim:\n \
  \     uri: http://136.116.192.130/v1\n      temperature: 0.1\n      top_p: 0.7\n\
  \      max_tokens: 128\n    skip_seq_start: <think>\n    skip_seq_end: </think>\n\
  \    \nsystem:\n  parallel_attempts: 8\n  lite: false\nEOF\n\nexport NIM_API_KEY=$API_KEY\
  \ &&\n\nexport XDG_DATA_HOME=/workspace/results &&\ngarak --config garak_config.yaml\
  \ --report_prefix=results"
config:
  output_dir: /workspace/results
  params:
    extra:
      probes: dan.DanInTheWild
      seed: 42
      skip_seq_end: </think>
      skip_seq_start: <think>
    max_new_tokens: 128
    parallelism: 8
    temperature: 0.1
    top_p: 0.7
  supported_endpoint_types:
  - chat
  type: garak
git_hash: 83a6bbd46e65be5bceb13b920aa2f90dd73ec155
results:
  groups:
    dan.DanInTheWild:
      metrics:
        pass_rate:
          scores:
            pass_rate:
              stats:
                count: 0
              value: 0.2
  tasks:
    dan.DanInTheWild:
      metrics:
        pass_rate:
          scores:
            pass_rate:
              stats:
                count: 0
              value: 0.2
target:
  api_endpoint:
    adapter_config:
      discovery:
        dirs: []
        modules: []
      endpoint_type: chat
      interceptors:
      - config:
          cache_dir: /workspace/results/cache
          max_saved_requests: 5
          max_saved_responses: 5
          reuse_cached_responses: true
          save_requests: true
          save_responses: true
        enabled: true
        name: caching
      - config: {}
        enabled: true
        name: endpoint
      - config:
          cache_dir: /workspace/results/response_stats_cache
          logging_aggregated_stats_interval: 100
        enabled: true
        name: response_stats
      log_failed_requests: false
      mode: server
      post_eval_hooks:
      - config:
          html_report_size: 5
          report_types:
          - html
          - json
        enabled: true
        name: post_eval_report
    api_key_name: API_KEY
    model_id: HuggingFaceTB/SmolLM2-135M-Instruct
    type: chat
    url: http://136.116.192.130/v1/chat/completions
