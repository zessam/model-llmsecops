# vLLM production-stack — CPU-only values for the model-llmsecops GKE cluster.
#   helm upgrade --install vllm vllm/vllm-stack --version 0.1.11 -f values-cpu.yaml

servingEngineSpec:
  runtimeClassName: "" # CPU nodes; chart defaults to "nvidia"
  containerPort: 8000
  servicePort: 80

  serviceMonitor:
    enabled: true # chart default is false; without it Prometheus scrapes nothing

  startupProbe:
    failureThreshold: 90 # ~15 min for download + CPU warmup

  modelSpec:
    - name: "smollm135m"
      enabled: true

      repository: "vllm/vllm-openai-cpu"
      tag: "latest"

      modelURL: "HuggingFaceTB/SmolLM2-135M-Instruct"
      replicaCount: 1

      serviceAccountName: "model-llmsecops-sa"

      podAnnotations:
        gke-gcsfuse/volumes: "true" # required, or the CSI volume never mounts

      requestGPU: 0
      requestCPU: 3
      requestMemory: "6Gi"
      limitCPU: 4
      limitMemory: "20Gi"

      extraVolumes:
        - name: model-bucket
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: "trisec-lab-model-llmsecops-models"
              mountOptions: "implicit-dirs"
      extraVolumeMounts:
        - name: model-bucket
          mountPath: /models

      vllmConfig:
        maxModelLen: 4096
        dtype: "float32" # no AVX512-BF16 on this CPU; bf16 falls back to slow torch
        extraArgs:
          - "--enforce-eager"
          - "--max-num-seqs"
          - "16"

      env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "2"
        - name: HF_HOME
          value: "/models" # chart defaults this to /tmp (ephemeral) without pvcStorage
        - name: HF_HUB_DISABLE_SYMLINKS
          value: "1" # gcsfuse has no symlinks; the HF cache needs this to download

      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "vllm"
          effect: "NoSchedule"
      nodeSelectorTerms:
        - matchExpressions:
            - key: "workload"
              operator: "In"
              values:
                - "vllm"

routerSpec:
  replicaCount: 1
  serviceType: LoadBalancer # public, unauthenticated, not behind Cloud Armor
  serviceMonitor:
    enabled: true
  routingLogic: "roundrobin"
  engineScrapeInterval: 15
  requestStatsWindow: 60
  startupProbe:
    failureThreshold: 60 # ~5 min; the router image is ~5.3GB
  resources:
    requests:
      cpu: "300m"
      memory: "1Gi" # 512Mi OOM-kills the router
    limits:
      memory: "1Gi"

# Workload Identity link for the gcsfuse mount; Terraform cannot create a KSA.
extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: model-llmsecops-sa
      namespace: default
      annotations:
        iam.gke.io/gcp-service-account: model-llmsecops-cluster-app@trisec-lab.iam.gserviceaccount.com
