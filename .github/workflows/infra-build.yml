name: Infra Build

# Stage 1 gates (no cloud creds) -> plan -> conftest policy -> apply (approval).
# OpenTofu only: backend.tf uses var.state_bucket, which Terraform rejects.
on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false # never cancel a running apply

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: read

env:
  TOFU_VERSION: 1.12.4
  CONFTEST_VERSION: 0.56.0
  GITLEAKS_VERSION: 8.18.4

jobs:
  validate:
    name: Validate + Guardrail Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: fmt + validate + test
        working-directory: terraform
        run: |
          tofu fmt -check -recursive
          # -backend=false needs no state bucket or GCP auth, and installs the
          # modules referenced from tests/ (else `tofu test` says "not installed")
          tofu init -backend=false -input=false
          tofu validate
          tofu test

  trivy:
    name: Trivy (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: sarif
          output: trivy.sarif
          exit-code: "0" # report-only; conftest is the blocking gate

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

  checkov:
    name: Checkov (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --exit-code 1

  plan:
    name: Tofu Plan
    runs-on: ubuntu-latest
    needs: [validate, trivy, checkov]
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false # the wrapper corrupts the redirect into plan.json

      - name: Tofu Init
        run: tofu init -input=false

      - name: Tofu Plan
        run: |
          tofu plan -input=false -out=tfplan
          tofu show -json tfplan > plan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: |
            terraform/tfplan
            terraform/plan.json
          retention-days: 1 # contains SA emails, IAM bindings, network layout

  policy:
    name: OPA Policy (conftest)
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v5

      - name: Download plan artifacts
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: plan

      - name: Setup conftest
        run: |
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

      - name: Conftest policy check (plan JSON)
        run: conftest test plan/plan.json -p terraform/policy

  apply:
    name: Tofu Apply
    runs-on: ubuntu-latest
    needs: policy
    if: github.event_name != 'pull_request'
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false

      - name: Tofu Init
        run: tofu init -input=false

      - name: Download plan artifacts
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: terraform

      - name: Tofu Apply
        run: tofu apply -input=false -auto-approve tfplan

      - name: Outputs
        run: tofu output
