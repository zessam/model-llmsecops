name: LLMSecOps

# Runs the promptfoo red team scan and uploads the report to the UI.
#
# Change WHAT is tested   -> security/promptfoo/promptfooconfig.yaml, then
#                            regenerate generated/redteam.yaml and commit it
# Change the target       -> the `url` in that same file
# Change WHERE results go -> UI_URL below
#
# Secrets required:
#   PROMPTFOO_API_KEY   promptfoo cloud (redteam graders need it, same as generate)
#   OPENROUTER_API_KEY  the judge model

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Public LoadBalancer of the promptfoo UI (svc/promptfoo in ns promptfoo).
  # NOT the vLLM router — they are separate LoadBalancers and this held the
  # router's IP for a while, which sends uploads nowhere.
  #   kubectl get svc promptfoo -n promptfoo \
  #     -o jsonpath='http://{.status.loadBalancer.ingress[0].ip}:{.spec.ports[0].port}'
  # Ephemeral — reserve a static IP if this becomes routine, or this silently
  # points at nothing.
  UI_URL: http://136.64.213.197:3000
  # Pinned, not :latest — a mutable tag cannot be cached correctly, and it lets
  # the CLI drift ahead of the server (values.yaml image.tag). Bump both together.
  PROMPTFOO_VERSION: 0.121.19
  CONCURRENCY: 2 # each test calls the model AND the judge
  # garak eval-factory image tag. Pinned (not :latest) so it can be cached.
  GARAK_VERSION: "26.03"

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      # Cache the image tarball. Only correct because the tag is pinned — with
      # :latest the key would never invalidate and you would run a stale build.
      - name: Cache promptfoo image
        uses: actions/cache@v4
        with:
          path: ~/.docker-cache
          key: promptfoo-image-${{ env.PROMPTFOO_VERSION }}

      # Only the response cache is cached — NOT the home directory, which holds
      # the promptfoo auth token. Actions caches are not a secret store.
      - name: Cache promptfoo responses
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pfcache
          key: promptfoo-cache-${{ github.run_id }}
          restore-keys: promptfoo-cache-

      - name: Load image
        run: |
          set -e
          IMAGE="ghcr.io/promptfoo/promptfoo:${PROMPTFOO_VERSION}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          if [ -f ~/.docker-cache/promptfoo.tar ]; then
            docker load -i ~/.docker-cache/promptfoo.tar
          else
            docker pull "$IMAGE"
            mkdir -p ~/.docker-cache
            docker save "$IMAGE" -o ~/.docker-cache/promptfoo.tar
          fi

      - name: Scan and upload
        working-directory: security/promptfoo
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          set -e
          mkdir -p "${{ runner.temp }}/pfhome" "${{ runner.temp }}/pfcache"

          [ -n "$PROMPTFOO_API_KEY" ] || {
            echo "::error::PROMPTFOO_API_KEY secret is not set."
            echo "::error::promptfoo gates red team scans behind an account — OPENROUTER_API_KEY pays for the judge but cannot satisfy this."
            echo "::error::Use the same key you passed to 'promptfoo auth login --api-key' locally."
            exit 1; }

          #  --user     : else files in the mount are owned by the image's uid
          #  HOME=/pf   : auth token + eval database live here, on a mount shared
          #               by every pf() call — that is how `share` finds the eval
          #               `eval` wrote, and how the login below survives
          #  "promptfoo": the image CMD is the server, and its entrypoint runs
          #               `node <arg>` for anything it does not recognise as a
          #               command. Naming the binary is what runs the CLI.
          pf() {
            docker run --rm -i \
              --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work \
              -v "${{ runner.temp }}/pfhome:/pf" \
              -v "${{ runner.temp }}/pfcache:/cache" \
              -e HOME=/pf -e PROMPTFOO_CACHE_PATH=/cache \
              -e PROMPTFOO_DISABLE_TELEMETRY=1 \
              -e OPENROUTER_API_KEY \
              -e PROMPTFOO_REMOTE_API_BASE_URL="$UI_URL" \
              -e PROMPTFOO_REMOTE_APP_BASE_URL="$UI_URL" \
              "$IMAGE" promptfoo "$@"
          }

          # Red team scans require a verified promptfoo account. Doing this as a
          # real login (rather than trusting an env var) mirrors exactly what
          # works locally, and the token persists on the /pf mount for the calls
          # below. Output silenced so the key never lands in the log.
          pf auth login --api-key "$PROMPTFOO_API_KEY" >/dev/null 2>&1 || {
            echo "::error::promptfoo auth login failed — check the PROMPTFOO_API_KEY secret."
            exit 1; }

          # -c generated/redteam.yaml, NOT promptfooconfig.yaml: the generated
          # file is the complete config (targets + purpose + the 160 test cases).
          # promptfooconfig.yaml is only the recipe used to produce it and has no
          # tests, so pointing at it scans nothing and reports a clean pass.
          #
          # `|| true` — failed probes are findings, not pipeline failures.
          pf eval -c generated/redteam.yaml --output results.json \
             -j "$CONCURRENCY" --no-progress-bar || true

          # Only upload if the scan actually produced something. Without this,
          # a scan that died early fails again at `share` with a confusing
          # "Could not load results" instead of the real reason.
          [ -s results.json ] || {
            echo "::error::Scan produced no results.json — see the eval output above."
            exit 1; }

          # Log out BEFORE sharing. While logged in, the CLI targets the cloud
          # org and silently ignores PROMPTFOO_REMOTE_* — results land there
          # instead of our server, while still printing our URL. `share` has no
          # --host flag, so dropping the cloud session is the only lever.
          # The login was only ever needed to get eval past the red team gate.
          pf auth logout >/dev/null 2>&1 || true

          pf share < /dev/null

          # Confirm the eval actually reached OUR server. Printing a URL proves
          # nothing — that is exactly how the cloud redirect went unnoticed.
          sleep 5
          if curl -fsS --max-time 30 "$UI_URL/api/results" | grep -q '"data":\[\]'; then
            echo "::error::Upload did not reach $UI_URL — its eval list is still empty."
            exit 1
          fi
          echo "Results: $UI_URL" >> "$GITHUB_STEP_SUMMARY"

  # LLMmap — model fingerprinting. Asks 8 probe questions and matches the answer
  # signature against 52 known models. Runs after promptfoo so the tools don't
  # share the CPU router; if: always() so a promptfoo failure doesn't skip it.
  llmmap:
    runs-on: ubuntu-latest
    needs: promptfoo
    if: always()
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          # No `cache: pip` — it hashes a dependency file in the checked-out
          # repo, and we have none. LLMmap's requirements.txt arrives later,
          # in the clone at /tmp/llmmap.
          python-version: "3.11" # LLMmap's stated requirement

      # LLMmap embeds responses with intfloat/multilingual-e5-large-instruct —
      # ~2.2GB pulled from HuggingFace on every cold run. Static weights, so the
      # key never needs to change; bump it only if LLMmap changes its embedder.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-e5-large-instruct-v1

      - name: Install LLMmap
        run: |
          set -e
          git clone --depth 1 https://github.com/pasquini-dario/LLMmap.git /tmp/llmmap
          # CPU torch first, or pip pulls the ~2GB CUDA build for nothing.
          pip install --quiet torch==2.7.1 --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet -r /tmp/llmmap/requirements.txt
          # Missing from their requirements.txt: LLMmap passes device_map to
          # transformers.from_pretrained, which hard-requires accelerate.
          pip install --quiet accelerate

      - name: Fingerprint the model
        working-directory: /tmp/llmmap
        env:
          TARGET_URL: http://136.116.192.130/v1/chat/completions
          TARGET_MODEL: HuggingFaceTB/SmolLM2-135M-Instruct
          OUT: ${{ github.workspace }}/llmmap-results.json
        run: python "$GITHUB_WORKSPACE/security/llmmap/fingerprint.py"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: llmmap-results
          path: llmmap-results.json
          if-no-files-found: warn

  # garak — model-level safety probes via NVIDIA NeMo Evaluator (eval-factory
  # container). Runs after llmmap so the three tools don't share the CPU router.
  # Needs the NCG_API_KEY secret to pull the image from NGC.
  garak:
    runs-on: ubuntu-latest
    environment: production
    needs: llmmap
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Cache garak detector models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/hf-cache
          key: garak-detectors-v1

      - name: Cache garak image
        uses: actions/cache@v4
        with:
          path: ~/.docker-cache
          key: garak-image-${{ env.GARAK_VERSION }}

      - name: Load or pull garak image
        run: |
          set -e
          IMAGE="nvcr.io/nvidia/eval-factory/garak:${GARAK_VERSION}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          if [ -f ~/.docker-cache/garak.tar ]; then
            docker load -i ~/.docker-cache/garak.tar
          else
            echo "${{ secrets.NCG_API_KEY }}" | docker login nvcr.io -u '$oauthtoken' --password-stdin
            docker pull "$IMAGE"
            mkdir -p ~/.docker-cache
            docker save "$IMAGE" -o ~/.docker-cache/garak.tar
          fi

      - name: Run garak safety probes
        run: |
          mkdir -p "$GITHUB_WORKSPACE/garak-results" "${{ runner.temp }}/hf-cache"
          docker run --rm \
            -e XDG_CONFIG_HOME=/garak-cfg \
            -v "$GITHUB_WORKSPACE/security/garak/run_config.yaml:/workspace/run_config.yaml:ro" \
            -v "$GITHUB_WORKSPACE/security/garak/garak.site.yaml:/garak-cfg/garak/garak.site.yaml:ro" \
            -v "$GITHUB_WORKSPACE/garak-results:/workspace/results" \
            -v "${{ runner.temp }}/hf-cache:/root/.cache/huggingface" \
            "$IMAGE" \
            nemo-evaluator run_eval \
              --eval_type garak \
              --model_id HuggingFaceTB/SmolLM2-135M-Instruct \
              --model_type chat \
              --model_url http://136.116.192.130/v1/chat/completions \
              --run_config /workspace/run_config.yaml \
              --output_dir /workspace/results

      # The container runs as root, so results are root-owned; hand them back to
      # the runner user or upload-artifact fails with EACCES. always() so it runs
      # even if the scan above errored.
      - name: Fix results ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/garak-results" || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: garak-results
          path: garak-results/
          if-no-files-found: warn

  # CyberSecEval (Purple Llama) — MITRE ATT&CK cyberattack-compliance test.
  # Asks the model to assist with attacks mapped to MITRE ATT&CK; a judge LLM
  # scores whether each reply is helpful for an attack. Runs last in the chain.
  # Reuses OPENROUTER_API_KEY (same Haiku judge as promptfoo) for the judge and
  # expansion models. The bare model is the OpenAI-compatible vLLM router.
  cyberseceval:
    runs-on: ubuntu-latest
    environment: production
    needs: garak
    if: always()
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pip's download cache. Rolling key (run_id + restore-keys) so each run
      # saves a fresh superset. Safe: pip re-resolves and only reuses wheels.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: purplellama-pip-${{ github.run_id }}
          restore-keys: purplellama-pip-

      - name: Install CyberSecEval
        run: |
          set -e
          git clone --depth 1 https://github.com/meta-llama/PurpleLlama.git /tmp/purplellama
          pip install --quiet -r /tmp/purplellama/CybersecurityBenchmarks/requirements.txt

      # CyberSecEval's own response cache: a JSON file of target-model answers,
      # keyed by (model, system_prompt, user_prompt). Re-runs skip re-querying
      # the slow CPU model. Rolling key accumulates answers across runs.
      - name: Cache CyberSecEval responses
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cse-cache
          key: cyberseceval-responses-${{ github.run_id }}
          restore-keys: cyberseceval-responses-

      - name: Run MITRE ATT&CK benchmark
        working-directory: /tmp/purplellama
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATASETS: /tmp/purplellama/CybersecurityBenchmarks/datasets
          OUT: ${{ github.workspace }}/cyberseceval-results
          CACHE: ${{ runner.temp }}/cse-cache
          NUM_CASES: "5"   # smoke test; raise for the real assessment
          MAX_TOKENS: "128" # cap output — the CPU model generating to the large
                            # default was what caused minutes/prompt and timeouts
        run: |
          set -e
          [ -n "$OPENROUTER_API_KEY" ] || { echo "::error::OPENROUTER_API_KEY not set"; exit 1; }
          mkdir -p "$OUT" "$CACHE"
          JUDGE="OPENAI::anthropic/claude-haiku-4.5::${OPENROUTER_API_KEY}::https://openrouter.ai/api/v1"
          python3 -m CybersecurityBenchmarks.benchmark.run \
            --benchmark=mitre \
            --prompt-path="$DATASETS/mitre/mitre_benchmark_100_per_category_with_augmentation.json" \
            --response-path="$OUT/mitre_responses.json" \
            --judge-response-path="$OUT/mitre_judge_responses.json" \
            --stat-path="$OUT/mitre_stat.json" \
            --judge-llm="$JUDGE" \
            --expansion-llm="$JUDGE" \
            --llm-under-test="OPENAI::HuggingFaceTB/SmolLM2-135M-Instruct::dummy::http://136.116.192.130/v1" \
            --num-test-cases="$NUM_CASES" \
            --max-tokens="$MAX_TOKENS" \
            --enable-cache \
            --cache-file="$CACHE/llm_cache.json"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cyberseceval-results
          path: cyberseceval-results/
          if-no-files-found: warn
