name: LLMSecOps

# Runs the promptfoo red team scan and uploads the report to the UI.
#
# Change WHAT is tested -> kubernetes/promptfoo/promptfooconfig.yaml
# Change HOW it runs    -> the env block below

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CLUSTER_NAME: model-llmsecops-cluster
  CLUSTER_LOCATION: us-central1-c
  NAMESPACE: default # where the model runs
  UI_NAMESPACE: promptfoo # where the results UI runs
  PROMPTFOO_IMAGE: ghcr.io/promptfoo/promptfoo:latest
  CONCURRENCY: 2 # each test calls the model AND the judge

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # promptfoo caches LLM responses — a re-run does not pay the judge again
      # for pairs it already graded.
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/promptfoo
          key: promptfoo-${{ github.run_id }}
          restore-keys: promptfoo-

      - name: Scan and upload
        working-directory: kubernetes/promptfoo
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          mkdir -p "${{ runner.temp }}/promptfoo/cache"

          lb() { kubectl -n "$1" get svc "$2" -o jsonpath='{.status.loadBalancer.ingress[0].ip}'; }
          MODEL="http://$(lb "$NAMESPACE" vllm-router-service):80"
          UI="http://$(lb "$UI_NAMESPACE" promptfoo):3000"

          #  --user   : else files in the mount are owned by the image's uid
          #  HOME=/pf : puts the eval database on the mount, so `share` can find
          #             the eval that `redteam eval` just wrote
          pf() {
            docker run --rm -i \
              --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work \
              -v "${{ runner.temp }}/promptfoo:/pf" \
              -e HOME=/pf -e PROMPTFOO_CACHE_PATH=/pf/cache \
              -e PROMPTFOO_DISABLE_TELEMETRY=1 -e OPENROUTER_API_KEY \
              -e PROMPTFOO_REMOTE_API_BASE_URL="$UI" \
              -e PROMPTFOO_REMOTE_APP_BASE_URL="$UI" \
              "$PROMPTFOO_IMAGE" "$@"
          }

          # Config holds the in-cluster address; use the public LB from here.
          sed -i "s|http://vllm-router-service.default.svc.cluster.local:80|$MODEL|" promptfooconfig.yaml

          # `|| true` — failed probes are findings, not pipeline failures.
          pf redteam eval -c promptfooconfig.yaml --output results.json \
             -j "$CONCURRENCY" --no-progress-bar || true

          pf share --yes < /dev/null
          echo "Results: $UI" >> "$GITHUB_STEP_SUMMARY"
