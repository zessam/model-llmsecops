name: Promptfoo UI Deploy

# Deploys the promptfoo results UI. That is all it does.
# It does not wait for the pod to become ready — check with:
#   kubectl -n promptfoo get pod

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CLUSTER_NAME: model-llmsecops-cluster
  CLUSTER_LOCATION: us-central1-c
  NAMESPACE: promptfoo
  RELEASE: promptfoo
  VALUES: kubernetes/promptfoo/values.yaml
  # The chart is not published to a chart repo — it lives in the promptfoo git
  # repo. Pinned to the tag matching image.tag in values.yaml.
  CHART_REPO: https://github.com/promptfoo/promptfoo.git
  CHART_REF: "0.109.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: azure/setup-helm@v5

      - name: Deploy
        run: |
          git clone --depth 1 --branch "$CHART_REF" "$CHART_REPO" /tmp/chart
          helm upgrade --install "$RELEASE" /tmp/chart/helm/chart/promptfoo \
            -n "$NAMESPACE" --create-namespace \
            -f "$VALUES"
