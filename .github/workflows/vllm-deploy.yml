name: vLLM Deploy

# push/PR: render + scan only (no cluster access). dispatch: also deploy.
on:
  workflow_dispatch:
  push:
    paths:
      - "kubernetes/production-stack/**"
      - ".github/workflows/vllm-deploy.yml"
  pull_request:
    paths:
      - "kubernetes/production-stack/**"
      - ".github/workflows/vllm-deploy.yml"

concurrency:
  group: vllm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  CLUSTER_NAME: model-llmsecops-cluster
  CLUSTER_LOCATION: us-central1-c
  NAMESPACE: default
  RELEASE: vllm
  CHART: vllm/vllm-stack
  CHART_REPO: https://vllm-project.github.io/production-stack
  VALUES: kubernetes/production-stack/values-cpu.yaml
  CHART_VERSION: 0.1.11
  HELM_VERSION: v3.16.3
  KUBECONFORM_VERSION: 0.6.7

jobs:
  render:
    name: Helm render + validate + scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add chart repo
        run: |
          helm repo add vllm "$CHART_REPO"
          helm repo update

      - name: Render manifests
        run: |
          mkdir -p rendered
          helm template "$RELEASE" "$CHART" \
            --version "$CHART_VERSION" \
            -n "$NAMESPACE" \
            -f "$VALUES" \
            > rendered/manifests.yaml

      - name: Schema-validate (kubeconform)
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /tmp kubeconform
          /tmp/kubeconform -summary -ignore-missing-schemas rendered/manifests.yaml

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: rendered
          format: sarif
          output: trivy-k8s.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

      - name: Report exposure
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import yaml
          docs = [d for d in yaml.safe_load_all(open("rendered/manifests.yaml")) if d]
          svcs = {d["metadata"]["name"]: d["spec"].get("type", "ClusterIP")
                  for d in docs if d.get("kind") == "Service"}
          print("## vLLM exposure\n")
          for name, typ in sorted(svcs.items()):
              print(f"- `{name}` → **{typ}**")
          public = [n for n, t in svcs.items() if t in ("LoadBalancer", "NodePort")]
          if public:
              print("\n> Reachable from outside the cluster: "
                    + ", ".join(f"`{n}`" for n in public))
          PY

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: rendered-manifests
          path: rendered/manifests.yaml
          retention-days: 7

  deploy:
    name: Helm deploy to GKE
    runs-on: ubuntu-latest
    needs: render
    if: github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add chart repo
        run: |
          helm repo add vllm "$CHART_REPO"
          helm repo update

      # ServiceMonitor is a Prometheus Operator CRD, installed by observability-deploy.yml.
      # vLLM must deploy with or without it, so drop the ServiceMonitors when it is absent.
      - name: Detect Prometheus Operator CRDs
        id: crds
        run: |
          if kubectl get crd servicemonitors.monitoring.coreos.com >/dev/null 2>&1; then
            echo "monitoring=true" >> "$GITHUB_OUTPUT"
          else
            echo "monitoring=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ServiceMonitor CRD not found — deploying vLLM without Prometheus scrape config. Run observability-deploy.yml, then re-run this workflow to enable metrics."
          fi

      - name: Deploy
        env:
          MONITORING: ${{ steps.crds.outputs.monitoring }}
        run: |
          extra=()
          if [ "$MONITORING" != "true" ]; then
            extra+=(--set servingEngineSpec.serviceMonitor.enabled=false
                    --set routerSpec.serviceMonitor.enabled=false)
          fi

          helm upgrade --install "$RELEASE" "$CHART" \
            --version "$CHART_VERSION" \
            -n "$NAMESPACE" --create-namespace \
            -f "$VALUES" \
            "${extra[@]}"
