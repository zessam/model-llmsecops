name: Observability Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: deploy
        type: choice
        options: [deploy, run-eval, uninstall]
  push:
    paths:
      - "kubernetes/observability/**"
      - ".github/workflows/observability-deploy.yml"
  pull_request:
    paths:
      - "kubernetes/observability/**"
      - ".github/workflows/observability-deploy.yml"

concurrency:
  group: observability-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  CLUSTER_NAME: model-llmsecops-cluster
  CLUSTER_LOCATION: us-central1-c
  MONITORING_NS: monitoring
  APP_NS: default
  RELEASE: kube-prom-stack
  CHART: prometheus-community/kube-prometheus-stack
  CHART_REPO: https://prometheus-community.github.io/helm-charts
  CHART_VERSION: 87.17.0
  VALUES: kubernetes/observability/kube-prom-stack-values.yaml
  HELM_VERSION: v3.16.3
  KUBECONFORM_VERSION: 0.6.7

jobs:
  validate:
    name: Validate + scan manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Schema-validate (kubeconform)
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /tmp kubeconform
          # ServiceMonitor is a CRD, hence -ignore-missing-schemas
          /tmp/kubeconform -summary -ignore-missing-schemas \
            kubernetes/observability/pushgateway.yaml \
            kubernetes/observability/dashboard.yaml \
            kubernetes/observability/lm-eval-job.yaml \
            kubernetes/observability/guidellm-job.yaml

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: kubernetes/observability
          format: sarif
          output: trivy-obs.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-obs.sarif
          category: trivy-observability

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment: production
    # inputs.action is empty on push, so default it — otherwise every step
    # below is false and the job "succeeds" having done nothing.
    env:
      ACTION: ${{ github.event.inputs.action || 'deploy' }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy monitoring stack
        if: env.ACTION == 'deploy'
        run: |
          helm repo add prometheus-community "$CHART_REPO"
          helm repo update
          helm upgrade --install "$RELEASE" "$CHART" \
            --version "$CHART_VERSION" \
            -n "$MONITORING_NS" --create-namespace \
            -f "$VALUES"
          kubectl apply -f kubernetes/observability/pushgateway.yaml
          kubectl apply -f kubernetes/observability/dashboard.yaml

      - name: Run evaluation jobs
        if: env.ACTION == 'run-eval'
        run: |
          # Jobs are immutable, so a re-run needs the old one gone first.
          kubectl delete job lm-eval-gsm8k guidellm-benchmark -n "$APP_NS" --ignore-not-found
          kubectl apply -f kubernetes/observability/lm-eval-job.yaml
          kubectl apply -f kubernetes/observability/guidellm-job.yaml

      - name: Uninstall
        if: env.ACTION == 'uninstall'
        run: |
          kubectl delete job lm-eval-gsm8k guidellm-benchmark -n "$APP_NS" --ignore-not-found
          kubectl delete -f kubernetes/observability/dashboard.yaml --ignore-not-found
          kubectl delete -f kubernetes/observability/pushgateway.yaml --ignore-not-found
          helm uninstall "$RELEASE" -n "$MONITORING_NS" --ignore-not-found
