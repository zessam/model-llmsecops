name: Infra Destroy

# Destroys the whole stack. force_destroy = true on the model bucket, so its
# objects go with it. Requires typing "destroy" AND the target project ID.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm teardown of ALL infra'
        required: true
        default: ""
      project_id:
        description: "Type the target GCP project ID (must match the configured project)"
        required: true
        default: ""

concurrency:
  group: infra-${{ github.ref }} # shared with Infra Build so they queue, not race
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TOFU_VERSION: 1.12.4

jobs:
  destroy:
    name: Tofu Destroy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}

    steps:
      # Inputs via env, never interpolated into the script body (shell injection).
      - name: Verify confirmation
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
          TYPED_PROJECT: ${{ github.event.inputs.project_id }}
          REAL_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ "$CONFIRM" != "destroy" ]; then
            echo "::error::You must type 'destroy' to confirm."
            exit 1
          fi
          if [ "$TYPED_PROJECT" != "$REAL_PROJECT" ]; then
            echo "::error::Project ID does not match the configured target project."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false

      - name: Tofu Init
        run: tofu init -input=false

      - name: Back up state before destroy
        run: |
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          DEST="gs://${TF_VAR_state_bucket}/model-llmsecops/state-backups/pre-destroy-${STAMP}.json"
          tofu state pull > /tmp/state-backup.json
          gcloud storage cp /tmp/state-backup.json "$DEST"
          echo "STATE_BACKUP=$DEST" >> "$GITHUB_ENV"

      - name: Plan destroy
        run: |
          tofu plan -destroy -input=false -out=tfplan-destroy
          tofu show -no-color tfplan-destroy > destroy-plan.txt
          COUNT="$(grep -cE '^  # .* will be destroyed' destroy-plan.txt || true)"
          {
            echo "## Destroy plan"
            echo ""
            echo "**${COUNT} resources will be destroyed** in \`${TF_VAR_project_id}\`."
            echo ""
            echo "State backed up to \`${STATE_BACKUP}\`."
            echo ""
            echo '```'
            grep -E '^  # .* will be destroyed' destroy-plan.txt || echo "(none)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan
        uses: actions/upload-artifact@v7
        with:
          name: destroy-plan
          path: terraform/destroy-plan.txt
          retention-days: 7

      - name: Tofu Destroy
        run: tofu apply -input=false -auto-approve tfplan-destroy
